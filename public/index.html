  <div class="container" style="margin-top: 80px;">
    <h1 style="font-family: 'Great Vibes', cursive; font-size: 4em; font-weight: 400;">Helloxglitter</h1>
    <p class="subtitle">*ੈ✩‧₊˚༺☆༻กรุณากรอกข้อมูลเพื่อจองคิว༺☆༻*ੈ✩‧₊˚</p>
    
    <!-- Real-time Queue Status Removed -->

    <form id="queueForm" class="booking-form-grid">
      <!-- Admin Selection -->
      <div class="form-group full-width admin-select-compact">
        <label for="recordedBy">👤 แอดมิน:</label>
        <select id="recordedBy" name="recordedBy" style="flex: 1; border: none; background: transparent; font-weight: 600;">
          <option value="">-- เลือก --</option>
          <option value="แอดมินกัมมี่🧸">แอดมินกัมมี่🧸</option>
          <option value="แอดมินเยลลี่🍬">แอดมินเยลลี่🍬</option>
          <option value="แอดมินแคนดี้🍭">แอดมินแคนดี้🍭</option>
          <option value="แอดมินปีโป้💘">แอดมินปีโป้💘</option>
          <option value="แอดมินฮันนี่🍯">แอดมินฮันนี่🍯</option>
          <option value="แอดมินเอมมี่👸👑">แอดมินเอมมี่👸👑</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label for="name">ชื่อ</label>
        <input type="text" id="name" name="name" placeholder="กรอกชื่อ">
      </div>

      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" name="phone" placeholder="0xxxxxxxxx"
          pattern="[0-9]{9,10}" title="กรุณากรอกเบอร์โทรศัพท์เป็นตัวเลข 9-10 หลัก">
      </div>

      <div class="form-group">
        <label for="tracking">หมายเลข Order</label>
        <input type="text" id="tracking" name="tracking" placeholder="เลข Order">
      </div>

      <div class="form-group">
        <label for="channel">ช่องทาง</label>
        <select id="channel" name="channel">
          <option value="">-- เลือก --</option>
          <option value="Shopee">Shopee</option>
          <option value="Line">Line</option>
          <option value="TikTok">TikTok</option>
        </select>
      </div>

      <div class="form-group">
        <label for="product">สินค้า</label>
        <select id="product" name="product">
          <option value="">-- เลือก --</option>
          <option value="3 กรต 6">3 กรต 6</option>
          <option value="6 กรต 12">6 กรต 12</option>
          <option value="จุ่มกิ้ฟ">จุ่มกิ้ฟ</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>

      <div class="form-group full-width checkbox-group">
        <input type="checkbox" id="addon" name="addon">
        <label for="addon">เพิ่มไส้ (3กรต6 +50฿ / 6กรต12 +100฿)</label>
      </div>

      <div class="form-group full-width">
        <label for="note">หมายเหตุ</label>
        <input type="text" id="note" name="note" placeholder="ระบุเหตุเพิ่มเติม (ถ้ามี)">
      </div>

      <button type="submit" class="btn">จองคิว</button>
    </form>
  </div>

  <div id="notification" class="notification"></div>

  <script>
    const form = document.getElementById('queueForm');
    const notification = document.getElementById('notification');
    // const currentServingEl = document.getElementById('currentServing');
    // const waitingCountEl = document.getElementById('waitingCount');

    // Real-time Queue Status Listener (Disabled as UI is removed)
    /*
    if (typeof db !== 'undefined') {
      db.collection('queue')
        .where('status', '==', 'waiting')
        .orderBy('timestamp', 'asc')
        .onSnapshot((snapshot) => {
          const waitingCount = snapshot.size;
          if (typeof waitingCountEl !== 'undefined' && waitingCountEl) {
             waitingCountEl.textContent = waitingCount;

          if (!snapshot.empty) {
            // First item in waiting queue is the one being served (or next to be served)

            if (typeof currentServingEl !== 'undefined' && currentServingEl) {
                currentServingEl.textContent = firstQueue.id || '-';
            }
          } else {
             if (typeof currentServingEl !== 'undefined' && currentServingEl) {
                currentServingEl.textContent = '-';
             }
          }
        }, (error) => {
          console.error("Firebase Status Listener Error:", error);
        });
    }
    */

    // Show notification function
    function showNotification(message, success = true) {
      notification.textContent = message;
      notification.style.background = success ? '#10b981' : '#ef4444';
      notification.classList.add('show');

      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    // Dynamic Channel Highlight
    const channelSelect = document.getElementById('channel');

    channelSelect.addEventListener('change', function () {
      const value = this.value;
      this.style.color = 'white'; // Default text to white when selected
      this.style.fontWeight = '500';

      switch (value) {
        case 'Line':
          this.style.backgroundColor = '#06c755';
          this.style.borderColor = '#06c755';
          break;
        case 'Shopee':
          this.style.backgroundColor = '#ee4d2d';
          this.style.borderColor = '#ee4d2d';
          break;
        case 'TikTok':
          this.style.backgroundColor = '#000000';
          this.style.borderColor = '#000000';
          break;
        default:
          this.style.backgroundColor = 'white';
          this.style.color = '#333';
          this.style.borderColor = '#e0e0e0';
      }
    });

    // Admin Selection Persistence Logic
    const recordedBySelect = document.getElementById('recordedBy');

    // Smart Paste Logic for Name Input
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');

    nameInput.addEventListener('paste', (e) => {
      // Prevent default paste to handle it manually
      e.preventDefault();
      
      // Get pasted text
      let paste = (e.clipboardData || window.clipboardData).getData('text');
      
      if (!paste) return;

      // 1. Extract Phone Number (Thai mobile pattern: 08x-xxx-xxxx, 09x, 06x)
      // Matches 06, 08, 09 followed by 8 digits, allowing spaces or dashes
      const phoneRegex = /0[689]\d{1}[-\s]?\d{3}[-\s]?\d{4}/;
      const phoneMatch = paste.match(phoneRegex);

      let extractedPhone = '';
      let cleanText = paste;

      if (phoneMatch) {
        extractedPhone = phoneMatch[0].replace(/[-\s]/g, ''); // Clean dashes/spaces
        phoneInput.value = extractedPhone; // Auto-fill phone field
        
        // Remove phone number from the text to isolate name
        cleanText = cleanText.replace(phoneMatch[0], '');
      }

      // 2. Extract Name
      // Logic: Take the first line or first chunk before address keywords
      // Keywords to stop at: numbers (house no), "หมู่", "ต.", "อ.", "จ.", "บ้าน", "ซอย", "ถนน"
      
      // Split by newlines first to try getting the first line
      let lines = cleanText.split(/[\r\n]+/);
      let potentialName = lines[0].trim();

      // If the first line is empty (e.g. paste started with newline), try next
      if (!potentialName && lines.length > 1) {
          potentialName = lines[1].trim();
      }

      // Further cleaning of the name line
      // Remove common prefixes
      potentialName = potentialName.replace(/^(ชื่อ|ผู้รับ|คุณ|K\.|คุณ|Tel|โทร)[:\s]*/ig, '');

      // Stop before address keywords if they appear in the same line
      // Regex looks for space followed by address start
      const addressStartRegex = /\s+(?=\d+\/|\d+|หมู่|ต\.|อ\.|จ\.|บ้าน|ซอย|ถนน|แขวง|เขต|จังหวัด|อำเภอ|ตำบล)/;
      const addressSplit = potentialName.split(addressStartRegex);
      
      if (addressSplit.length > 0) {
          potentialName = addressSplit[0];
      }

      // Final trim
      nameInput.value = potentialName.trim();
      
      // Visual feedback (Optional)
      if (extractedPhone) {
          showNotification('✨ แยกชื่อและเบอร์โทรให้แล้ว!', true);
          phoneInput.style.borderColor = '#10b981';
          setTimeout(() => phoneInput.style.borderColor = '', 2000);
      }
    });

    // Load last admin from localStorage
    const savedAdmin = localStorage.getItem('lastAdmin');
    if (savedAdmin) {
      recordedBySelect.value = savedAdmin;
    }

    // Save admin preference immediately when changed
    recordedBySelect.addEventListener('change', function () {
      if (this.value) {
        localStorage.setItem('lastAdmin', this.value);
      }
    });

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = form.querySelector('.btn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⏳ กำลังจอง...';
      btn.style.opacity = '0.7';
      btn.style.cursor = 'not-allowed';

      const name = document.getElementById('name').value;
      const tracking = document.getElementById('tracking').value;
      const phone = document.getElementById('phone').value;
      const note = document.getElementById('note').value;
      const channel = document.getElementById('channel').value;
      const product = document.getElementById('product').value;
      const isAddon = document.getElementById('addon').checked;

      const recordedBy = document.getElementById('recordedBy').value;

      // Price Logic
      let addonPrice = 0;
      if (isAddon) {
        if (product === '3 กรต 6') addonPrice = 50;
        if (product === '6 กรต 12') addonPrice = 100;
      }

      const formData = {
        name, tracking, phone, note, channel, product,
        addon: isAddon ? 'เพิ่มไส้' : '-',
        price: addonPrice,
        recordedBy
      };

      // Save admin preference
      localStorage.setItem('lastAdmin', recordedBy);

      try {
        const response = await fetch('/.netlify/functions/api/api/add', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        // Fallback for local development or if rewrite fails
        if (response.status === 404) {
             const fallbackResponse = await fetch('/api/add', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(formData)
            });
            
            const result = await fallbackResponse.json();
             if (result.success) {
              showNotification('✅ ' + result.message, true);
              form.reset();
              // Restore admin name after reset
              document.getElementById('recordedBy').value = recordedBy;
              // Trigger change event to re-apply color styles
              document.getElementById('channel').dispatchEvent(new Event('change'));
            } else {
              showNotification('❌ ' + result.message, false);
            }
            return;
        }

        const result = await response.json();

        if (result.success) {
          showNotification('✅ ' + result.message, true);
          form.reset();
          // Restore admin name after reset
          document.getElementById('recordedBy').value = recordedBy;
          // Trigger change event to re-apply color styles
          document.getElementById('channel').dispatchEvent(new Event('change'));
        } else {
          showNotification('❌ ' + result.message, false);
        }
      } catch (error) {
        showNotification('❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง', false);
        console.error('Error:', error);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
      }
    });
  </script>
</body>
