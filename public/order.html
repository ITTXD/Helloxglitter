  <style>
    /* Additional styles for preorder page */
    /* Hide scrollbar for main page */
    html, body {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
      overflow: hidden; /* Disable scrolling */
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none; /* Chrome/Safari/Opera */

    .container {
      padding: 20px !important;
      max-width: 900px !important;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    @media (min-width: 769px) {
      .main-grid {
        height: calc(100vh - 180px);
        overflow: hidden;
      }
      
      /* Form Side: Scrollable but hidden scrollbar */

        height: 100%;
        overflow-y: auto;
        padding-bottom: 30px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

        display: none;
      }

      /* Right Side Container */
      .right-column-container {
        height: 100%;
        overflow: hidden;
      }
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

    .booking-form-grid {
      gap: 8px !important;
    }
    
    /* Preorder List Styles */

      height: 100%;
    }

    .preorder-list {

    }

    }

    .form-group label {
      font-size: 0.9em !important;

      font-size: 0.95em;

  <script>
    const form = document.getElementById('preorderForm');
    const notification = document.getElementById('notification');
    const preorderList = document.getElementById('preorderList');
    const rightContainer = document.querySelector('.right-column-container');

    // Layout sync is now handled by CSS Grid height
    function syncListHeight() {
      // Logic moved to CSS for better stability
    }

    window.addEventListener('load', syncListHeight);
    window.addEventListener('resize', syncListHeight);

    if (typeof ResizeObserver !== 'undefined') {
      const resizeObserver = new ResizeObserver(syncListHeight);
      resizeObserver.observe(form);
    }
    
    // Image Preview Logic
    const imageUpload = document.getElementById('imageUpload');
    const previewGrid = document.getElementById('preview-grid');
    const uploadContent = document.getElementById('upload-content');
    
    let selectedFiles = [];

    imageUpload.addEventListener('change', function(e) {
      if (this.files && this.files.length > 0) {
        // Add new files to array
        const newFiles = Array.from(this.files);
        selectedFiles = [...selectedFiles, ...newFiles];
        updatePreview();
        // Reset input so same file can be selected again if needed
        this.value = '';
      }
    });

    function updatePreview() {
      previewGrid.innerHTML = '';
      
      selectedFiles.forEach((file, index) => {
        const reader = new FileReader();
        const div = document.createElement('div');
        div.className = 'preview-item';
        
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '×';
        removeBtn.onclick = () => removeFile(index);
        
        const img = document.createElement('img');
        
        reader.onload = function(e) {
          img.src = e.target.result;
        }
        
        div.appendChild(img);
        div.appendChild(removeBtn);
        previewGrid.appendChild(div);
        
        reader.readAsDataURL(file);
      });
      
      // Update upload text if needed
      if (selectedFiles.length > 0) {
          uploadContent.innerHTML = `
             <div class="file-upload-icon" style="color: #10b981;">✅</div>
             <div>เลือกแล้ว ${selectedFiles.length} รูป</div>
             <div style="font-size: 0.8em; margin-top: 5px;">คลิกเพิ่มรูปอีกได้</div>
          `;
      } else {
          uploadContent.innerHTML = `
             <div class="file-upload-icon">📷</div>
             <div>คลิกเลือกรูปภาพ</div>
             <div style="font-size: 0.8em; margin-top: 5px;">เลือกได้หลายไฟล์</div>
          `;
      }
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        updatePreview();
    }

    // Show notification function
    function showNotification(message, success = true) {
      notification.textContent = message;
      notification.style.background = success ? '#10b981' : '#ef4444';
      notification.classList.add('show');

      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    // Admin Selection Persistence Logic
    const recordedBySelect = document.getElementById('recordedBy');

    // Load last admin from localStorage
    const savedAdmin = localStorage.getItem('lastAdmin');
    if (savedAdmin) {
      recordedBySelect.value = savedAdmin;
    }

    recordedBySelect.addEventListener('change', function () {
      if (this.value) {
        localStorage.setItem('lastAdmin', this.value);
      }
    });



    // Image Compression Logic
    function compressImage(file, maxWidth = 1200, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress to JPEG
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.onerror = (error) => reject(error);
            };
            reader.onerror = (error) => reject(error);
        });
    }

    let currentLimit = 20;

    function debounceSearch() {

    function resetSearch() {
      document.getElementById('searchName').value = '';
      document.getElementById('searchDate').value = '';
      document.getElementById('sortOrder').value = 'desc';
      currentLimit = 20; // Reset limit
      loadPreorders();
    }

    // Load and display preorders
    function loadPreorders() {
      const preorderList = document.getElementById('preorderList');
      const searchName = document.getElementById('searchName').value.trim();
      const searchDate = document.getElementById('searchDate').value;
      const sortOrder = document.getElementById('sortOrder').value || 'desc';
      
      // Stop previous listener if exists
      if (unsubscribe) {
        unsubscribe();
      }

      if (typeof db !== 'undefined') {
        // Query Logic
        let query = db.collection('orders');
        let isSearching = false;

        if (searchDate) {
           isSearching = true;
           const start = new Date(searchDate);
           start.setHours(0,0,0,0);
           const end = new Date(searchDate);
           end.setHours(23,59,59,999);
           
           // Query by Date Range
           query = query.where('timestamp', '>=', start).where('timestamp', '<=', end);
           // Note: Cannot OrderBy timestamp desc with Range filter easily without index, so we sort client-side
        } else if (searchName) {
           isSearching = true;
           // Query by Name (StartWith)
           // Note: Case sensitive. For better search, need stored "searchKey" or similar.
           query = query.where('name', '>=', searchName).where('name', '<=', searchName + '\uf8ff');
        } else {
           // Standard: All items ordered by time
           query = query.orderBy('timestamp', sortOrder).limit(currentLimit);
        }

        if (isSearching) {
            query = query.limit(50); // Limit search results
        }

        // Real-time listener
        unsubscribe = query.onSnapshot((snapshot) => {
            isLoading = false; // Reset loading state

            if (snapshot.empty) {
              preorderList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); margin-top: 20px;">ไม่พบรายการที่ค้นหา</p>';
              return;
            }

            let items = [];
            snapshot.forEach(doc => {
              const data = doc.data();
              items.push({ id: doc.id, ...data });
            });

            // Client-side filtering/sorting if needed
            if (searchDate && searchName) {
                // If filtered by Date in Firestore, filter by Name here
                items = items.filter(item => (item.name || '').includes(searchName));
            }
            
            // If searching (especially by Name), re-sort by timestamp desc (client-side) because we lost the orderBy in query
            if (isSearching) {
                items.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.seconds : 0;
                    const timeB = b.timestamp ? b.timestamp.seconds : 0;
                    return timeB - timeA;
                });
            }

            if (items.length === 0) {
                preorderList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); margin-top: 20px;">ไม่พบรายการที่ค้นหา</p>';
                return;
            }

            let html = '';
            items.forEach((data, index) => {
              const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString('th-TH') : 'เพิ่งสั่ง';
              
              // Handle Images (Support both old single imageUrl and new imageUrls array)
              let images = [];
              if (data.imageUrls && Array.isArray(data.imageUrls)) {
                  images = data.imageUrls;
              } else if (data.imageUrl) {
                  images = [data.imageUrl];
              }

              let imageHtml = '';
              if (images.length > 0) {
                  const safeImages = JSON.stringify(images).replace(/"/g, '&quot;');
                  imageHtml = `
                    <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;">
                        ${images.map((img, i) => `
                            <img src="${img}" alt="Preorder Image" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0;" onclick="openGalleryModal(${safeImages})">
                        `).join('')}
                    </div>
                  `;
              }
              
              // Calculate Order Number based on Sort Order
              // Goal: Oldest = #1, Newest = #Max
              // If DESC (New -> Old): #Max, #Max-1...
              // If ASC (Old -> New): #1, #2...
              const orderNumber = sortOrder === 'asc' ? (index + 1) : (items.length - index);

              // Escape quotes for onclick
              const safeData = JSON.stringify(data).replace(/"/g, '&quot;');
              
              const isCompleted = data.status === 'completed';

              const completedBadge = isCompleted ? '<span style="color: #10b981; font-weight: bold; font-size: 0.9em; margin-right: 10px;">✅ เสร็จสิ้นแล้ว</span>' : '';
              const depositBadge = isDeposit ? '<span style="color: #64748b; font-weight: bold; font-size: 0.9em; margin-right: 10px; border: 1px solid #cbd5e1; padding: 2px 8px; border-radius: 4px; background: white;">📦 ฝากไว้</span>' : '';
              const missingBadge = isMissing ? '<span style="color: #ef4444; font-weight: bold; font-size: 0.9em; margin-right: 10px; border: 1px solid #fca5a5; padding: 2px 8px; border-radius: 4px; background: white;">⚠️ ตกหล่น</span>' : '';

              html += `
                <div class="preorder-item" style="${itemStyle}">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span style="font-weight: bold; color: var(--primary-color); background: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-size: 0.9em;">#${orderNumber}</span>
                      <span style="font-size: 0.8em; color: var(--text-secondary);">บันทึกโดย: ${data.recordedBy || '-'}</span>
                    </div>
                  </div>
                  <h3 style="color: var(--primary-color); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between;">
                      ${data.name || 'ไม่ระบุชื่อลูกค้า'}
                      <div>
                        ${completeBtn}
                        <button class="edit-btn" onclick="openEditModal(${safeData})">✏️ แก้ไข</button>
                        <button class="delete-btn" onclick="deletePreorder('${data.id}')">🗑️ ลบ</button>
                      </div>
                  </h3>
                  ${data.phone ? `<p><strong>📞 โทร:</strong> ${data.phone}</p>` : ''}
                  <p><strong>📍 ที่อยู่:</strong> ${data.address || '-'}</p>
                  <p><strong>📦 รายการ:</strong> <span style="color: #059669; font-weight: 600;">${data.items || '-'}</span></p>
                  ${data.note ? `<p><strong>💬 หมายเหตุ:</strong> ${data.note}</p>` : ''}
                  ${imageHtml}
                  <div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 8px; gap: 10px;">
                     ${completedBadge}
                     ${depositBadge}
                     ${missingBadge}
                     
                     <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox" id="deposit-${data.id}" ${isDeposit ? 'checked' : ''} 
                               onchange="toggleDeposit('${data.id}', this.checked)"
                               style="width: 16px; height: 16px; cursor: pointer;">
                        <label for="deposit-${data.id}" style="font-size: 0.9em; color: #64748b; cursor: pointer; margin: 0;">📦 ฝาก</label>
                     </div>

                     <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox" id="missing-${data.id}" ${isMissing ? 'checked' : ''} 
                               onchange="toggleMissing('${data.id}', this.checked)"
                               style="width: 16px; height: 16px; cursor: pointer;">
                        <label for="missing-${data.id}" style="font-size: 0.9em; color: #ef4444; cursor: pointer; margin: 0;">⚠️ ตกหล่น</label>
                     </div>

                     <span style="font-size: 0.8em; color: #94a3b8;">🕒 ${date}</span>
                  </div>
                </div>
              `;
            });
            
            // Load More Button Removed - Infinite Scroll Implemented
            // if (!isSearching && snapshot.size === currentLimit) { ... }
 
             preorderList.innerHTML = html;
             
             // Setup Infinite Scroll Sentinel
             if (!isSearching && snapshot.size >= currentLimit) {
                 setupInfiniteScroll();
             }
          }, (error) => {
            isLoading = false;
            console.error("Error fetching preorders:", error);
            preorderList.innerHTML = '<p style="text-align: center; color: #ef4444; margin-top: 20px;">เกิดข้อผิดพลาดในการโหลดข้อมูล (อาจต้องสร้าง Index)</p>';
          });
      } else {
        // Demo mode fallback
        preorderList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); margin-top: 20px;">Demo Mode: ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>';
      }
    }

    function loadMore() {
        if (isLoading) return;
        isLoading = true;

        // Visual feedback
        const sentinel = document.getElementById('scroll-sentinel');
        if (sentinel) {
            sentinel.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:0.9em;">⏳ กำลังโหลดเพิ่มเติม...</div>';
        }

        currentLimit += 20;
        loadPreorders();
    }

    // Infinite Scroll Implementation
    const listObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoading) {
             loadMore();
        }
    }, { 
        root: document.getElementById('preorderList'),
        threshold: 0.1 
    });

    function setupInfiniteScroll() {
        const existingSentinel = document.getElementById('scroll-sentinel');
        if (existingSentinel) existingSentinel.remove();

        const sentinel = document.createElement('div');
        sentinel.id = 'scroll-sentinel';
        sentinel.style.height = '20px';
        sentinel.style.marginTop = '10px';
        preorderList.appendChild(sentinel);
        listObserver.observe(sentinel);
    }

        }

        try {

            // Note: Removed orderBy to avoid "Missing Index" error. Sorting is done in JS.
            const snapshot = await db.collection('orders')
                .where('status', '==', 'completed')
                .get();

                showNotification('❌ ไม่พบรายการที่เสร็จสิ้น', false);

            }

            let dataRaw = [];
            snapshot.forEach(doc => {

            });

            // Sort by Timestamp Descending (Newest first)
            dataRaw.sort((a, b) => {
                const timeA = a.timestamp ? a.timestamp.seconds : 0;
                const timeB = b.timestamp ? b.timestamp.seconds : 0;
                return timeB - timeA;
            });

            const data = dataRaw.map(c => ({

                'รายการสินค้า': c.items,
                'หมายเหตุ': c.note || ''
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            
            // Adjust column widths
            const wscols = [
                {wch: 20}, // Date
                {wch: 20}, // Name
                {wch: 50}, // Address
                {wch: 40}, // Items
                {wch: 20}  // Note
            ];
            ws['!cols'] = wscols;

            const wb = XLSX.utils.book_new();

            // Filename with Date

            XLSX.writeFile(wb, `Shipping_List_${dateStr}.xlsx`);
            
            showNotification(`✅ Export สำเร็จ (${data.length} รายการ)`);

        } catch (error) {
            console.error("Export Error:", error);
            const msg = 'เกิดข้อผิดพลาดในการ Export: ' + error.message;
            showNotification('❌ ' + msg, false);
            alert('❌ ' + msg); // Fallback alert
        } finally {
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    }

            'ยืนยันเสร็จสิ้นงาน?',

                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showNotification('✅ อัปเดตสถานะเรียบร้อย', true);
                } catch (error) {
                    console.error('Update Error:', error);
                    showNotification('❌ เกิดข้อผิดพลาด: ' + error.message, false);
                    throw error;
                }
            }
        );
    }

    function deletePreorder(docId) {
        showConfirmModal(
            'ยืนยันการลบ?', 
            'รายการนี้จะถูกลบถาวรและไม่สามารถกู้คืนได้<br>ยืนยันที่จะลบหรือไม่?', 
            '🗑️', 
            '#ef4444', 
            async () => {
                try {
                    await db.collection('orders').doc(docId).delete();
                    showNotification('🗑️ ลบรายการเรียบร้อย', true);
                } catch (error) {
                    console.error('Delete Error:', error);
                    showNotification('❌ เกิดข้อผิดพลาด: ' + error.message, false);
                    throw error;
                }
            }
        );
    }

    async function toggleDeposit(docId, isChecked) {
        try {
            const newStatus = isChecked ? 'deposited' : 'pending';
            await db.collection('orders').doc(docId).update({
                status: newStatus,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
            // No need to reload, the real-time listener will update the UI
        } catch (error) {
            console.error('Toggle Deposit Error:', error);
            showNotification('❌ เกิดข้อผิดพลาดในการอัปเดตสถานะฝาก', false);
            // Revert checkbox state visually if failed
            const checkbox = document.getElementById(`deposit-${docId}`);
            if (checkbox) checkbox.checked = !isChecked;
        }
    }

    async function toggleMissing(docId, isChecked) {
        try {
            const newStatus = isChecked ? 'missing' : 'pending';
            await db.collection('orders').doc(docId).update({
                status: newStatus,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
            // No need to reload, the real-time listener will update the UI
        } catch (error) {
            console.error('Toggle Missing Error:', error);
            showNotification('❌ เกิดข้อผิดพลาดในการอัปเดตสถานะตกหล่น', false);
            // Revert checkbox state visually if failed
            const checkbox = document.getElementById(`missing-${docId}`);
            if (checkbox) checkbox.checked = !isChecked;
        }
    }

    // Handle Edit Submission
    editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const docId = document.getElementById('editDocId').value;
        const name = document.getElementById('editName').value;
        const phone = document.getElementById('editPhone').value;
        const address = document.getElementById('editAddress').value;
        const items = document.getElementById('editItems').value;
        const note = document.getElementById('editNote').value;
        const status = document.getElementById('editStatus').value;
        
        const submitBtn = editForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'กำลังบันทึก...';
        
        try {
            await db.collection('orders').doc(docId).update({
                name,
                phone,
                address,
                items,
                note,
                status,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showNotification('✅ แก้ไขข้อมูลสำเร็จ', true);
            closeEditModal();
        } catch (error) {
            console.error('Update Error:', error);
            showNotification('❌ แก้ไขไม่สำเร็จ: ' + error.message, false);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
        if (event.target == editModal) {
            closeEditModal();
        }
    }

    // Call loadPreorders on page load
    loadPreorders();
  </script>
</body>

</html>
