<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - จัดการคิวลูกค้า</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=16">
    <link rel="stylesheet" href="badges.css?v=8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="firebase-config.js?v=2"></script>
    <style>
        .connection-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-live {
            background: #dcfce7;
            color: #166534;
        }

        .status-live .status-dot {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse-green 2s infinite;
        }

        .status-connecting {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-connecting .status-dot {
            background: #eab308;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-error .status-dot {
            background: #ef4444;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Channel Specific Backgrounds */
        .queue-item.line-gradient {
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
            border-left: 6px solid #22c55e;
        }

        .queue-item.shopee-gradient {
            border-left: 6px solid #f97316;
        }

        .queue-item.tiktok-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border-left: 6px solid #000000;
        }

        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Desktop Layout with Independent Scrolling */
        @media (min-width: 1024px) {
            .dashboard-container {
                height: calc(100vh - 40px); /* Fit viewport exactly minus body padding */
                display: flex;
                flex-direction: column;
                padding-bottom: 0; /* No extra padding needed inside */
                overflow: hidden; /* Prevent container scroll */
            }

            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                align-items: stretch; /* Stretch to fill height */
                gap: 20px;
                flex: 1; /* Fill remaining vertical space */
                min-height: 0; /* Allow grid to shrink if needed */
                display: grid;
            }

            .queue-section, .history-section {
                height: 100%; /* Fill grid cell */
                display: flex;
                flex-direction: column;
                background: rgba(255, 255, 255, 0.4);
                border-radius: 16px;
                padding: 15px;
                box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.6);
                overflow: hidden; /* Contain children */
            }

            .queue-header {
                flex-shrink: 0;
            }

            .queue-list {
                flex: 1; /* Fill remaining space */
                padding-right: 12px;
                overflow-y: auto; /* Scroll internally */
                scrollbar-gutter: stable;
            }

            #loadMoreContainer {
                flex-shrink: 0;
                padding-top: 10px;
            }
        }

        /* Mobile Layout Scrolling */
        @media (max-width: 1023px) {
            .queue-list {
                max-height: 60vh;
                overflow-y: auto;
                padding: 5px;
                border: 1px solid rgba(0,0,0,0.05);
                border-radius: 10px;
            }
        }

        /* Custom Scrollbar Styling */
        .queue-list::-webkit-scrollbar {
            width: 8px;
        }
        .queue-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }
        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .queue-list::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        /* History Styles */
        .completed-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #dcfce7;
            color: #166534;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .time-badge {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 5px;
        }

        .skipped-item {
            background: #ffebee !important;
            opacity: 1;
            filter: none;
            border: 2px solid #ef4444 !important;
        }

        .completed-item {
            background: #f0fdf4 !important;
            border: 2px solid #22c55e !important;
        }



        /* Animation for Deletion */
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            30% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(0); opacity: 0; filter: blur(10px); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .deleting-item {
            animation: explode 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards !important;
            pointer-events: none;
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .history-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.85em;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Helloxglitter</a>
        <div class="nav-links">
            <a href="index.html" class="nav-item">🏠 หน้าแรก</a>
            <a href="preorder.html" class="nav-item">🛍️ สั่งพรี</a>
            <a href="order.html" class="nav-item">🛍️ สั่งของ</a>
            <a href="dashboard.html" class="nav-item active">⚙️ ระบบหลังบ้าน</a>
        </div>
    </nav>

    <div class="container dashboard-container" style="max-width: 1400px; margin-top: 80px;">
        <h1 style="font-family: 'Great Vibes', cursive; font-size: 2.5em; font-weight: 400; text-align: center; margin-bottom: 5px; margin-top: 0; background: none; -webkit-text-fill-color: initial; color: var(--text-primary);">Helloxglitter</h1>
        <h1>📊 Dashboard - จัดการคิว</h1>
        <p class="subtitle">ระบบจัดการคิวลูกค้าอัตโนมัติ</p>
        
        <div class="dashboard-grid">
            <!-- Left Column: Current Queue -->
            <div class="queue-section">
                <div class="queue-header" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <h2 class="section-title">⏳ รายการคิวรอ</h2>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <div id="connectionStatus" class="connection-badge status-connecting">
                                <span class="status-dot"></span>
                                <span id="statusText">...</span>
                            </div>
                            <span class="queue-count" id="queueCount">0 คิว</span>
                        </div>
                    </div>
                    <!-- Queue Search -->
                    <div style="margin-top: 15px;">
                        <input type="text" id="queueSearch" placeholder="🔍 ค้นหาชื่อ, เบอร์โทร หรือ Order No." 
                            style="padding: 10px; border-radius: 20px; border: 1px solid #e2e8f0; width: 100%; font-size: 0.9em;">
                    </div>
                </div>

                <div id="queueList" class="queue-list" style="max-height: 60vh; overflow-y: auto; padding-right: 6px;">
                    <!-- Queue items will be inserted here -->
                </div>
            </div>

            <!-- Right Column: History -->
            <div class="history-section">
                <div class="queue-header" style="margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 10px;">
                        <h2 class="section-title">📜 ประวัติเสร็จสิ้น</h2>
                        <div class="history-controls" style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
                                <button onclick="initHistory()" class="btn btn-small" style="background: #10b981; color: white; width: auto; margin: 0;">
                                    🔄 รีเฟรช
                                </button>
                                <button onclick="exportToExcel()" class="btn btn-small" style="background: #6366f1; color: white; width: auto; margin: 0;">
                                    📥 Excel
                                </button>
                                <button onclick="clearAllHistory()" class="btn btn-small" style="background: #ef4444; color: white; width: auto; margin: 0;">
                                    🗑️ ล้าง
                                </button>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 10px; text-align: right; font-size: 0.9em; color: #64748b;">
                        จำนวนทั้งหมด: <span id="historyCount">0</span> รายการ
                    </div>
                    <!-- History Search -->
                    <div style="margin-top: 15px;">
                        <input type="text" id="historySearch" placeholder="🔍 ค้นหาประวัติ (ชื่อ, เบอร์, Order)..." 
                            style="padding: 10px; border-radius: 20px; border: 1px solid #e2e8f0; width: 100%; font-size: 0.9em;">
                    </div>
                </div>

                <div id="historyList" class="queue-list">
                    <!-- History items will be inserted here -->
                </div>

                <div id="loadMoreContainer" style="text-align: center; margin-top: 20px; display: none;">
                    <button id="loadMoreBtn" onclick="loadMoreLocal()" class="btn"
                        style="width: auto; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 10px 30px;">
                        ดูเพิ่มเติม...
                    </button>
                </div>
            </div>
        </div>

    </div>


    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay" style="z-index: 9999;">
        <div class="modal-container" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none; padding-bottom: 0;">
                <div style="font-size: 3.5em; margin-bottom: 10px; animation: bounce 1s infinite;">🗑️</div>
            </div>
            <h2 style="margin: 0; color: #333; font-size: 1.5em;">ยืนยันการลบ?</h2>
            <p style="color: #64748b; margin: 10px 0 25px;">คุณต้องการลบข้อมูลนี้ถาวรใช่หรือไม่?<br><span style="font-size: 0.85em; color: #ef4444;">(ไม่สามารถกู้คืนได้)</span></p>
            <div class="modal-footer" style="justify-content: center; border-top: none; padding-top: 0; gap: 15px;">
                <button type="button" class="btn" onclick="closeConfirmModal()" style="background: #f1f5f9; color: #64748b; width: 100px;">ยกเลิก</button>
                <button type="button" class="btn" onclick="executeDelete()" style="background: #ef4444; color: white; width: 100px; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);">ลบถาวร</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2 style="margin: 0; color: #333;">✏️ แก้ไขข้อมูลลูกค้า</h2>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editName">ชื่อ-นามสกุล</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-group">
                    <label for="editTracking">หมายเลข Order</label>
                    <input type="text" id="editTracking">
                </div>
                <div class="form-group">
                    <label for="editPhone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="editPhone">
                </div>
                <div class="form-group">
                    <label for="editProduct">สินค้า</label>
                    <select id="editProduct"
                        style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;">
                        <option value="3 กรต 6">3 กรต 6</option>
                        <option value="6 กรต 12">6 กรต 12</option>
                        <option value="จุ่มกิ้ฟ">จุ่มกิ้ฟ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ตัวเลือกเพิ่มเติม</label>
                    <div style="display: flex; gap: 15px; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" id="editAddon" style="transform: scale(1.2);"> เพิ่มไส้
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editNote">หมายเหตุ</label>
                    <input type="text" id="editNote">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeEditModal()">ยกเลิก</button>
                    <button type="submit" class="btn">💾 บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        const queueList = document.getElementById('queueList');
        const queueCountEl = document.getElementById('queueCount');
        const notification = document.getElementById('notification');
        
        // History Elements
        const historyList = document.getElementById('historyList');
        const historyCountEl = document.getElementById('historyCount');
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        const historySearch = document.getElementById('historySearch');

        // History Search Logic (client-side, instant)
        let searchTimeout;
        historySearch.addEventListener('input', (e) => { 
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            searchTimeout = setTimeout(() => {
                lastSearchQuery = query;
                const data = getFilteredData();
                renderHistoryList(data, true);
            }, 200);
        });

        // Show notification function
        function showNotification(message, success = true) {
            notification.textContent = message;
            notification.style.background = success ? '#10b981' : '#ef4444';
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        let currentQueueData = []; 
        let currentHistoryData = [];
        let masterHistoryData = [];
        let lastSearchQuery = '';
        let lastFirebaseId = null;
        const LIMIT = 20;

        // Helper for channel gradient classes
        function getChannelClass(channel) {
            switch (channel) {
                case 'Line': return 'line-gradient';
                case 'Shopee': return 'shopee-gradient';
                case 'TikTok': return 'tiktok-gradient';
                default: return '';
            }
        }

        // Helper for channel badge styles
        function getChannelStyle(channel) {
            // Only return colors, padding/radius handled by class
            switch (channel) {
                case 'Line': return 'background: #06c755; color: white;';
                case 'Shopee': return 'background: #ee4d2d; color: white;';
                case 'TikTok': return 'background: #000000; color: white;';
                default: return 'background: #fecfef; color: #d63384;';
            }
        }

        function displayQueue(queue) {
            if (queue.length === 0) {
                queueList.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>ไม่มีคิวในขณะนี้</p>
          </div>
        `;
                return;
            }

            queueList.innerHTML = queue.map((customer, index) => {
                const queueNumber = customer.id;
                
                return `
        <div class="queue-item ${getChannelClass(customer.channel)}" data-id="${customer.id}" style="transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);">
          <div class="queue-item-container">
            <span class="queue-number">${queueNumber}</span>
            <div class="queue-info">
              <h3>${customer.name}</h3>
              <div style="display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap;">
                  <span class="badge-channel" style="${getChannelStyle(customer.channel)}">${customer.channel || ''}</span>
                  <span class="badge-product">${customer.product || ''}</span>
                  ${(customer.addon || '').includes('เพิ่มไส้') ? `<span class="badge-addon">+เพิ่มไส้ ${customer.product === '3 กรต 6' ? '+50฿' : '+100฿'}</span>` : ''}
                  <span class="badge-admin">👤 ${customer.recordedBy || 'System'}</span>
              </div>
                  <p>🆔 Order No: ${customer.tracking || ''}</p>
                  <p>📞 ${customer.phone}</p>
                  ${customer.note ? `
                <div class="queue-note">
                    <strong class="note-label">📝 หมายเหตุ:</strong>
                    <span class="note-content">${customer.note}</span>
                </div>` : ''}
                </div>
            <div class="action-buttons">
                <button class="btn-export" style="background: #ef4444; color: white; border: none; animation: none;" onclick="openEditModal(${customer.id})">✏️ แก้ไข</button>
                <button class="btn-complete" style="background: #f59e0b; color: white;" onclick="skipQueue(${customer.id})">
                  ⏭️ ข้าม (ไม่อยู่)
                </button>
                <button class="btn-complete" onclick="completeQueue(${customer.id})">
                  ✅ เสร็จสิ้น
                </button>
                <button class="btn-delete" style="background: #475569; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9em;" onclick="deleteCustomerPermanent(${customer.id})">🗑️ ลบ</button>
            </div>
          </div>
        </div>
      `;
            }).join('');
        }

        // --- HISTORY FUNCTIONS ---
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function highlightText(text, query) {
            const safe = escapeHtml(text || '');
            if (!query) return safe;
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(escapedQuery, 'gi');
            return safe.replace(regex, (m) => `<span style="background:#fff3cd; color:#7c2d12; border-radius:3px; padding:0 2px;">${m}</span>`);
        }

        function getFilteredData() {
            const q = (lastSearchQuery || '').toLowerCase();
            if (!q) return masterHistoryData;
            return masterHistoryData.filter(item => 
                (item.name || '').toLowerCase().includes(q) ||
                (item.phone || '').toLowerCase().includes(q) ||
                (item.tracking || '').toLowerCase().includes(q)
            );
        }

        async function initHistory() {
            try {
                currentHistoryData = [];
                lastFirebaseId = null;
                historyList.innerHTML = '<p style="text-align:center; padding: 20px;">กำลังโหลด...</p>';
                
                // Try Netlify Functions path first
                let response = await fetch(`/.netlify/functions/api/api/history?limit=1000`);

                // Fallback if 404
                if (response.status === 404) {
                    response = await fetch(`/api/history?limit=1000`);
                }

                const result = await response.json();

                if (result.success) {
                    const rawData = result.queue || [];
                    masterHistoryData = [...rawData].sort((a, b) => {
                        const aId = a.id != null ? a.id : 0;
                        const bId = b.id != null ? b.id : 0;
                        return aId - bId; // Low to High
                    });
                    lastSearchQuery = '';
                    renderHistoryList(masterHistoryData, true);
                } else {
                    showNotification('❌ ' + result.message, false);
                }
            } catch (error) {
                console.error('Error initializing history:', error);
                showNotification('❌ เกิดข้อผิดพลาดในการดึงข้อมูลประวัติ', false);
            }
        }

        function renderHistoryList(fullData, reset = true) {
            const data = Array.isArray(fullData) ? fullData : [];
            if (reset) {
                currentHistoryData = [];
                historyList.innerHTML = '';
            }
            const start = currentHistoryData.length;
            const nextBatch = data.slice(start, start + LIMIT);
            if (nextBatch.length === 0 && start === 0) {
                historyList.innerHTML = `
                  <div class="empty-state">
                    <div class="icon">📜</div>
                    <p>ยังไม่มีประวัติคิวที่เสร็จสิ้น</p>
                  </div>`;
            } else {
                currentHistoryData = [...currentHistoryData, ...nextBatch];
                displayHistory(nextBatch, false);
            }
            historyCountEl.textContent = `${data.length}`;
            loadMoreContainer.style.display = currentHistoryData.length < data.length ? 'block' : 'none';
        }

        function loadMoreLocal() {
            const data = getFilteredData();
            renderHistoryList(data, false);
        }

        async function fetchHistory(reset = true, searchQuery = null) {
            if (reset) {
                await initHistory();
                return;
            }
            if (typeof searchQuery === 'string') {
                lastSearchQuery = searchQuery;
            }
            const data = getFilteredData();
            renderHistoryList(data, true);
        }

        function displayHistory(newItems, reset) {
            const html = newItems.map((customer) => {
                const isSkipped = customer.status === 'skipped';
                const completedDate = isSkipped ? null : (customer.completedAt ? new Date(customer.completedAt) : null);
                const timeStr = completedDate ? completedDate.toLocaleString('th-TH') : '-';

                const displayNumber = customer.id != null ? customer.id : '-';

                return `
                <div class="queue-item history-item ${isSkipped ? 'skipped-item' : 'completed-item'}" style="animation: slideInRight 0.5s ease-out;">
                  <div class="queue-item-container">

        async function exportToExcel() {

                return;
            }

            showNotification('⏳ กำลังเตรียมไฟล์ Excel...');

            const data = currentHistoryData.map((c) => {
                const isSkipped = c.status === 'skipped';
                const orderNum = c.id != null ? c.id : '-';

                return {
                    'ลำดับ': orderNum,
                    'ชื่อ-นามสกุล': c.name,
                    'หมายเลข Order': c.tracking,
                    'เบอร์โทร': c.phone,
                    'ช่องทาง': c.channel,
                    'สินค้า': c.product,
                    'ตัวเลือกเสริม': c.addon,
                    'หมายเหตุ': c.note || '',
                    'ราคาเพิ่ม': c.price,
                    'เวลาจอง': new Date(c.timestamp).toLocaleString('th-TH'),
                    'สถานะ': isSkipped ? 'ไม่อยู่' : 'เสร็จสิ้น',
                    'เวลาดำเนินการ': isSkipped
                        ? (c.skippedAt ? new Date(c.skippedAt).toLocaleString('th-TH') : '-')
                        : (c.completedAt ? new Date(c.completedAt).toLocaleString('th-TH') : '-')
                };
            });

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "HistoryRecords");
            XLSX.writeFile(wb, `Queue_History_${new Date().toISOString().split('T')[0]}.xlsx`);
            showNotification('✅ Export สำเร็จ!');
        }

        // Real-time System (Firebase Client SDK)
        function initRealtimeUpdates() {
            const statusBadge = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            const queueSearch = document.getElementById('queueSearch');

            // Queue Search Logic
            queueSearch.addEventListener('keyup', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = currentQueueData.filter(item => 
                    (item.name || '').toLowerCase().includes(query) ||
                    (item.phone || '').includes(query) ||
                    (item.tracking || '').toLowerCase().includes(query)
                );
                displayQueue(filtered);
            });

            statusBadge.className = 'connection-badge status-connecting';
            statusText.textContent = 'Connecting...';

            if (typeof db === 'undefined') {
                console.error("Firebase DB not initialized");
                statusBadge.className = 'connection-badge status-error';
                statusText.textContent = 'Config Missing';
                return;
            }

            // 1. Listen to Waiting Queue
            db.collection('queue')
                .where('status', '==', 'waiting')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const queue = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        queue.push({ 
                            ...data, 
                            firebaseId: doc.id 
                        });
                    });

                    statusBadge.className = 'connection-badge status-live';
                    statusText.textContent = 'Live';
                    currentQueueData = queue;
                    displayQueue(queue);
                    queueCountEl.textContent = `${queue.length} คิว`;
                }, (error) => {
                    console.error("Firebase Queue Listener Error:", error);
                    statusBadge.className = 'connection-badge status-error';
                    statusText.textContent = 'Error';
                });

            // 2. Listen to History (Completed & Skipped)
            // Note: Removing orderBy from query to avoid "Missing Index" errors on client side.
            // We will sort in memory instead.
            db.collection('queue')
                .where('status', 'in', ['completed', 'skipped'])
                .onSnapshot((snapshot) => {
                    const history = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        history.push({ 
                            ...data, 
                            firebaseId: doc.id 
                        });
                    });

                    // Update master data and Sort in Memory
                    // Sort by ID Ascending (Low to High) as requested
                    masterHistoryData = history.sort((a, b) => {
                         const aId = a.id != null ? a.id : 0;
                         const bId = b.id != null ? b.id : 0;
                         return aId - bId;
                    });
                    
                    // Force refresh history display immediately
                    // Pass true to reset pagination and show from top
                    renderHistoryList(masterHistoryData, true);
                }, (error) => {
                    console.error("Firebase History Listener Error:", error);
                    // Fallback: If listener fails, try to load once manually
                    // (This shouldn't happen if we remove orderBy)
                });
        }

        initRealtimeUpdates();
        
        // Edit Functionality

                name: document.getElementById('editName').value,
                tracking: document.getElementById('editTracking').value,
                phone: document.getElementById('editPhone').value,
                product: document.getElementById('editProduct').value,
                addon: addonStr,

            };

            try {
                // Try Netlify Functions path first
                let response = await fetch(`/.netlify/functions/api/api/queue/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                // Fallback if 404
                if (response.status === 404) {
                    response = await fetch(`/api/queue/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedData)
                    });
                }

                const result = await response.json();
                if (result.success) {
                    showNotification('✅ ' + result.message);
                    closeEditModal();
                } else {
                    showNotification('❌ ' + result.message, false);
                }
            } catch (error) {
                showNotification('❌ เกิดข้อผิดพลาดในการบันทึก', false);
            }
        });
